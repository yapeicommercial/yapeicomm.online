    <style>
        :root {
            --primary-deep: #06325c;
            --primary-accent: #3b82f6;
            --liquid-bg: linear-gradient(135deg, #eef2f7 0%, #f5f7fa 50%, #e0eafd 100%);
            --glass-card: rgba(255, 255, 255, 0.45);
            --glass-card-hover: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.5);
            --glass-border-hover: rgba(255, 255, 255, 0.75);
            --glass-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.06);
            --glass-shadow-hover: 0 24px 48px 0 rgba(6, 50, 92, 0.15);
            --accent-gold: #f59e0b;
        }

        body {
            background: var(--liquid-bg);
            background-attachment: fixed;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: #1e293b;
            min-height: 100vh;
        }

        /* Glassmorphic Top Navigation Panel */
        .navbar-glass {
            background: rgba(6, 50, 92, 0.8) !important;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        }
        .navbar-brand i {
            color: var(--accent-gold);
            text-shadow: 0 0 12px rgba(245, 158, 11, 0.4);
        }
        .nav-link {
            border-radius: 50px;
            margin: 0 4px;
            padding: 0.5rem 1.2rem !important;
            font-weight: 500;
            transition: all 0.3s ease;
            color: rgba(255, 255, 255, 0.85) !important;
        }
        .nav-link.active, .nav-link:hover {
            background: rgba(255, 255, 255, 0.15) !important;
            color: #ffffff !important;
        }

        /* Ambient Fluid Header */
        .blog-header-glass {
            background: linear-gradient(135deg, rgba(254, 246, 233, 0.4) 0%, rgba(255, 255, 255, 0.2) 100%);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            position: relative;
            overflow: hidden;
            margin-top: 76px;
        }
        .blog-header-glass::after {
            content: "✨";
            font-size: 160px;
            position: absolute;
            right: 40px;
            bottom: -50px;
            opacity: 0.06;
            pointer-events: none;
        }
    </style>
</head>
